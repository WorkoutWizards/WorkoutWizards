{% extends "authenticated-base.html" %}

{% block external_js %}
<script src="{{ url_for('static', path='js/recipes.js')}}"></script>
{% endblock %}

{% block subpage_content %}

<div style="padding:30px;">

  <h4 class="center-align">Recipes</h4>

  <!-- FILTER BUTTONS -->
  <div style="margin-bottom:20px;" class="center-align">
    <button class="btn filter-btn" onclick="loadMeals()">All</button>
    <button class="btn orange filter-btn" onclick="filterMeals('breakfast')">Breakfast</button>
    <button class="btn green filter-btn" onclick="filterMeals('lunch')">Lunch</button>
    <button class="btn blue filter-btn" onclick="filterMeals('dinner')">Dinner</button>
    <button class="btn purple filter-btn" onclick="filterMeals('snack')">Snacks</button>
  </div>

  <!-- MEALS CONTAINER -->
  <div id="meals-container" style="display:flex; flex-wrap:wrap; gap:20px;"></div>

</div>

<script src="/app/static/js/recipes.js"></script>

{% endblock %}
