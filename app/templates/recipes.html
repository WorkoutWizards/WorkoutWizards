{% extends "authenticated-base.html" %}

{% block external_js %}
<script src="{{ url_for('static', path='js/recipes.js')}}"></script>
{% endblock %}

{% block subpage_content %}

<div style="padding:30px;">

  <h2>Recipes</h2>

  <!-- FILTER BUTTONS -->
  <div style="margin-bottom:20px;">
    <button onclick="loadMeals()">All</button>
    <button onclick="filterMeals('breakfast')">Breakfast</button>
    <button onclick="filterMeals('lunch')">Lunch</button>
    <button onclick="filterMeals('dinner')">Dinner</button>
    <button onclick="filterMeals('snack')">Snacks</button>
  </div>

  <!-- MEALS CONTAINER -->
  <div id="meals-container" style="display:flex; flex-wrap:wrap; gap:20px;"></div>

</div>

<script src="/app/static/js/recipes.js"></script>

{% endblock %}
