{% extends "authenticated-base.html" %}

{% block external_js %}
<script src="{{ url_for('static', path='js/app.js') }}"></script>
{% endblock %}

{% block subpage_content %}
<style>
    th, td{
        color: black !important;
    }

     /* Blur + dark overlay */
.modal-backdrop.show {
    opacity: 0.6;
    backdrop-filter: blur(5px);
}

/* Smooth modal animation */
.modal.fade .modal-dialog {
    transform: scale(0.95);
    transition: all 0.2s ease;
}

.modal.show .modal-dialog {
    transform: scale(1);
}
</style>
<h1>Exercises</h1>

<form method="get" action="/api/exercises">
    <div class="col-12">
        <label class="form-label">Select Muscle Group</label>
        <select class="form-select browser-default" name="muscle" onchange="this.form.submit()">
            <option value="" disabled {% if not muscle %}selected{% endif %}>Select Muscle Group</option>
    
            <option value="abdominals" {% if muscle == "abdominals" %}selected{% endif %}>Abdominals</option>
            <option value="calves" {% if muscle == "calves" %}selected{% endif %}>Calves</option>
            <option value="forearms" {% if muscle == "forearms" %}selected{% endif %}>Forearms</option>
            <option value="hamstrings" {% if muscle == "hamstrings" %}selected{% endif %}>Hamstrings</option>
            <option value="lower_back" {% if muscle == "lower_back" %}selected{% endif %}>Lower Back</option>
            <option value="neck" {% if muscle == "neck" %}selected{% endif %}>Neck</option>
            <option value="traps" {% if muscle == "traps" %}selected{% endif %}>Traps</option>
            <option value="adductors" {% if muscle == "adductors" %}selected{% endif %}>Adductors</option>
            <option value="biceps" {% if muscle == "biceps" %}selected{% endif %}>Biceps</option>
            <option value="chest" {% if muscle == "chest" %}selected{% endif %}>Chest</option>
            <option value="glutes" {% if muscle == "glutes" %}selected{% endif %}>Glutes</option>
            <option value="lats" {% if muscle == "lats" %}selected{% endif %}>Lats</option>
            <option value="middle_back" {% if muscle == "middle_back" %}selected{% endif %}>Middle Back</option>
            <option value="quadriceps" {% if muscle == "quadriceps" %}selected{% endif %}>Quadriceps</option>
            <option value="triceps" {% if muscle == "triceps" %}selected{% endif %}>Triceps</option>
        </select>
    </div>
</form>

<table border="1" style="margin-top:20px;">
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Muscle</th>
            <th>Difficulty</th>
        </tr>
    </thead>
    <tbody>
        {% for ex in exercise_db %}
        <tr>
            
            <td>{{ ex.name }}</td>
            <td>{{ ex.type }}</td>
            <td>{{ ex.muscle }}</td>
            <td>{{ ex.difficulty }}</td>
           
         <td><!--MAKE THE ADDWORKOUT BUTTON FUNCTIONAL-->
        
      <td>
    <button type="button" class="btn btn-success" data-bs-toggle="modal"
                                    data-bs-target="#addExercise-{{ex.id}}">
        Add Workout
    </button>

    <div class="modal fade" id="addExercise-{{ex.id}}" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <form method="POST" action="/add_exercise/">

                    <div class="modal-header">
                        <h5 class="modal-title">Choose Routine</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <div class="mb-2">
                            <label>Choose a routine:</label>

                            <select class="form-select browser-default" name="routine_id">

                                {%for routine in routines%}
                                    <option value="{{routine.id}}">{{routine.name}}</option>
                                {%endfor%}
                            </select>

                            <input type="hidden" name= "exercise_id" value="{{ex.id}}">

                            <input type="hidden" name= "name" value="{{ex.name}}">

                            <input type="hidden" name= "muscle" value="{{ex.muscle}}">
                            
                            <input type="hidden" name= "type" value="{{ex.type}}">

                            <input type="hidden" name= "difficulty" value="{{ex.difficulty}}">
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">Save</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</td>
        </td>
    
        </tr>
        {% endfor %}
    </tbody>
</table>
    <div id="exerciseModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:white; padding:20px; margin:100px auto; width:300px;">
        
        <form method="POST" action="/add_exercise/">
            
            <input type="hidden" name="exercise_id" id="modal_exercise_id">
            <input type="hidden" name="routine_id" value="{{ selected_routine_id }}">
            <input type="hidden" name="name" id="modal_name">
            <input type="hidden" name="type" id="modal_type">
            <input type="hidden" name="muscle" id="modal_muscle">
            <input type="hidden" name="difficulty" id="modal_difficulty">

            <p id="modal_display"></p>

            <button type="submit">Confirm</button>
            <button type="button" onclick="closeModal()">Cancel</button>
        </form>

    </div>
</div>
    </div>
{% endblock %}
