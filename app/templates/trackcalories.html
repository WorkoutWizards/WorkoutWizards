{% extends "authenticated-base.html" %}

{% block subpage_content %}
<style>
    .card-image-custom {
  height: 200px;
  overflow: hidden;
  position: relative;
}

.card-image-custom img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-image-custom .card-title {
  background: rgba(0,0,0,0.6);
  padding: 8px 12px;
  border-radius: 6px;
  margin: 10px;
}
</style>
<div class="container">

  <h4 class="center-align">My Calorie Tracker</h4>

  <!-- FLASH MESSAGES -->

<div style="margin-bottom:20px;" class="center-align">

  <button class="btn filter-btn" onclick="filterMeals('all')">All</button>
  <button class="btn orange filter-btn" onclick="filterMeals('breakfast')">Breakfast</button>
  <button class="btn green filter-btn" onclick="filterMeals('lunch')">Lunch</button>
  <button class="btn blue filter-btn" onclick="filterMeals('dinner')">Dinner</button>
      <button class="btn blue filter-btn" onclick="filterMeals('snack')">Snacks</button>
</div>
  <!-- TRACKED MEALS -->
  <div class="row">
    {% for log in logs %}
    <div class="col s12 m6 l4 meal-card" data-category="{{ log.meal.type }}">
      <div class="card hoverable">

       <div class="card-image card-image-custom">
  <img src="{{ log.meal.image or 'https://images.unsplash.com/photo-1560807707-8cc77767d783' }}">
  <span class="card-title">{{ log.meal.name }}</span>
</div>

        <div class="card-content">
          <p><b>{{ log.calories }}</b> kcal</p>
          <p><b>{{ log.meal.name }}</b> </p>
          <p>Protein: {{ log.protein }}kg</p>
          <p>Carbs: {{ log.carbs }}kg</p>
          <p>Fat: {{ log.fat }}kg</p>
        </div>

        <div class="card-action">

          <!-- DELETE -->
          <form action="/api/tracker/delete-meal/" method="POST" style="display:inline;">
            <input type="hidden" name="tracker_id" value="{{ log.id }}">
            <button class="btn red waves-effect">Remove</button>
          </form>

          <!-- UPDATE (simple example) -->
          <form action="/api/tracker/update-meal/" method="POST" style="display:inline;">
            <input type="hidden" name="tracker_id" value="{{ log.id }}">
            <input type="number" name="calories" placeholder="Edit kcal" style="width:80px;">
            <button class="btn blue waves-effect">Update</button>
          </form>

        </div>

      </div>
    </div>
    {% endfor %}
  </div>


<!-- INIT MATERIALIZE -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    M.Modal.init(document.querySelectorAll('.modal'));
});
function filterMeals(category) {
  const meals = document.querySelectorAll('.meal-card');
  const buttons = document.querySelectorAll('.filter-btn');

  // Highlight active button
  buttons.forEach(btn => btn.classList.remove('grey'));
  event.target.classList.add('grey');

  meals.forEach(meal => {
    const mealCategory = meal.getAttribute('data-category');

    if (category === 'all' || mealCategory === category) {
      meal.style.display = "block";
    } else {
      meal.style.display = "none";
    }
  });
}
</script>

{% endblock %}
